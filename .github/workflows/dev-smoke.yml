name: Dev Smoke (PR)

on:
  pull_request:
    branches: [main]

jobs:
  smoke-dev:
    name: Smoke Test Dev App
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.3'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web-client/package-lock.json

      - name: Build web client for embed
        working-directory: web-client
        run: |
          npm ci
          npm run build

      - name: Start local server
        run: |
          nohup go run . -mode server -port 8080 -db /tmp/bingo-dev-smoke.db > /tmp/bingo-dev-smoke.log 2>&1 &

      - name: Wait for local server health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8080/api/status > /dev/null; then
              echo "✓ Local server ready"
              exit 0
            fi
            sleep 2
          done
          echo "✗ Local server did not become healthy"
          tail -100 /tmp/bingo-dev-smoke.log || true
          exit 1

      - name: Build CLI binary
        run: go build -o binGO-CLI .

      - name: Run local CLI smoke (host flow)
        run: |
          chmod +x scripts/cli-smoke.sh
          scripts/cli-smoke.sh rw http://localhost:8080

      - name: Install Playwright browser
        working-directory: web-client
        run: npx playwright install --with-deps chromium

      - name: Run local host-flow smoke tests
        working-directory: web-client
        env:
          SMOKE_BASE_URL: http://localhost:8080
        run: npm run smoke:host-flow

      - name: Upload artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dev-playwright-artifacts
          path: |
            web-client/test-results
            web-client/playwright-report
            /tmp/bingo-dev-smoke.log
          if-no-files-found: ignore
