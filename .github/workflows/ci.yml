name: CI/CD

# Dagger-based pipeline — all logic lives in dagger/main.go.
# This workflow is a thin trigger layer that calls Dagger functions.
#
# Push to main    → test + build + publish + deploy to staging
# PR to main      → test only (fast feedback, no deploy)
# Tag v*          → test + build + publish + deploy to production + GitHub Release
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  # Fast tests on every push and PR — unit + integration (~30s)
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.3'

      - name: Run tests via Dagger
        working-directory: dagger
        run: go run . test

  # Deploy to staging on push to main
  deploy-staging:
    name: Deploy to Staging
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.3'

      - name: Build + Publish + Deploy to Staging
        working-directory: dagger
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(git rev-parse --short HEAD)
          go run . all --env staging --version "$VERSION" --registry-user jkmlnop

  # Load test staging after every deploy to main — validates the live server
  # under concurrent load and rate-limit conditions before any prod release.
  # Skipped on PRs and tag pushes (those never deploy to staging).
  load-test-staging:
    name: Load Test Staging
    needs: deploy-staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.3'

      - name: Wait for staging to be healthy
        run: |
          echo "Waiting for staging server to be healthy..."
          for i in $(seq 1 12); do
            if curl -sf https://bingo-server-staging.fly.dev/api/status > /dev/null; then
              echo "✓ Staging is healthy"
              exit 0
            fi
            echo "  attempt $i/12 — retrying in 10s"
            sleep 10
          done
          echo "✗ Staging did not become healthy in 2 minutes"
          exit 1

      - name: Run load test against staging
        env:
          LOAD_TEST_URL: https://bingo-server-staging.fly.dev
          ADMIN_API_KEY: ${{ secrets.STAGING_ADMIN_API_KEY }}
          METRICS_AUTH_TOKEN: ${{ secrets.STAGING_METRICS_AUTH_TOKEN }}
          MAX_CONNS_PER_IP: '20'
        run: go test -tags=e2e -timeout=10m -v ./tests -run TestFullSystemLoadWithPlayers

  # Browser-level smoke test after staging deploy.
  # Catches UI/route regressions that API-only checks miss.
  smoke-test-staging-ui:
    name: Smoke Test Staging UI
    needs: deploy-staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web-client/package-lock.json

      - name: Install web client dependencies
        working-directory: web-client
        run: npm ci

      - name: Install Playwright browser
        working-directory: web-client
        run: npx playwright install --with-deps chromium

      - name: Wait for staging to be healthy
        run: |
          echo "Waiting for staging server to be healthy..."
          for i in $(seq 1 18); do
            if curl -sf https://bingo-server-staging.fly.dev/api/status > /dev/null; then
              echo "✓ Staging is healthy"
              exit 0
            fi
            echo "  attempt $i/18 — retrying in 10s"
            sleep 10
          done
          echo "✗ Staging did not become healthy in 3 minutes"
          exit 1

      - name: Run staging smoke tests
        working-directory: web-client
        env:
          SMOKE_BASE_URL: https://bingo-server-staging.fly.dev
        run: npm run smoke:host-flow

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: staging-playwright-artifacts
          path: |
            web-client/test-results
            web-client/playwright-report
          if-no-files-found: ignore

      - name: Open staging hotfix issue on smoke failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const sha = context.sha.substring(0, 7);
            const title = `Staging smoke failed after deploy (${sha})`;
            const body = [
              `Automated staging browser smoke checks failed for commit ${context.sha}.`,
              ``,
              `Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `Environment: https://bingo-server-staging.fly.dev`,
              ``,
              `Suggested response:`,
              `1. Reproduce with Playwright on staging`,
              `2. Create a hotfix branch from main`,
              `3. Submit PR referencing this issue`,
            ].join("\n");

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ["bug", "staging", "hotfix"],
            });

  # Deploy to production + create GitHub Release on version tags
  deploy-production:
    name: Deploy to Production
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.3'

      - name: Build + Publish + Deploy to Production
        working-directory: dagger
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          go run . all --env production --version "$VERSION" --registry-user jkmlnop

      - name: Create GitHub Release
        working-directory: dagger
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          go run . release --version "$VERSION"
