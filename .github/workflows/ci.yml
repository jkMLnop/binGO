name: CI/CD

# Dagger-based pipeline — all logic lives in dagger/main.go.
# This workflow is a thin trigger layer that calls Dagger functions.
#
# Push to main    → test + build + publish + deploy to staging
# PR to main      → test only (fast feedback, no deploy)
# Tag v*          → test + build + publish + deploy to production + GitHub Release
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  DAGGER_VERSION: "0.15.3"

jobs:
  # Fast tests on every push and PR — unit + integration (~30s)
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25.3'

      - name: Install Dagger CLI
        run: curl -fsSL https://dl.dagger.io/dagger/install.sh | sh

      - name: Run tests via Dagger
        working-directory: dagger
        run: go run . test

  # Deploy to staging on push to main
  deploy-staging:
    name: Deploy to Staging
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25.3'

      - name: Install Dagger CLI
        run: curl -fsSL https://dl.dagger.io/dagger/install.sh | sh

      - name: Build + Publish + Deploy to Staging
        working-directory: dagger
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(git rev-parse --short HEAD)
          go run . all --env staging --version "$VERSION" --registry-user jkmlnop

  # Deploy to production + create GitHub Release on version tags
  deploy-production:
    name: Deploy to Production
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25.3'

      - name: Install Dagger CLI
        run: curl -fsSL https://dl.dagger.io/dagger/install.sh | sh

      - name: Build + Publish + Deploy to Production
        working-directory: dagger
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          go run . all --env production --version "$VERSION" --registry-user jkmlnop

      - name: Create GitHub Release
        working-directory: dagger
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          go run . release --version "$VERSION"
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
