# binGO CI/CD Pipeline
#
# All pipeline logic lives in dagger/main.go (Go SDK).
# This workflow uses actions/setup-go to run it directly — the Dagger Go SDK
# manages its own engine connection internally; wrapping it in the
# dagger/dagger-action would create a nested Dagger connection.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

env:
  GO_VERSION: '1.25.3'
  DAGGER_VERSION: '0.15.3'

jobs:
  test:
    name: Unit + Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run unit tests
        run: go test ./...
      - name: Run integration tests
        run: go test -tags=integration -count=1 -timeout=5m ./tests -v

  test-container:
    name: Container Regression Tests
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run container regression tests
        run: go test -tags=container -timeout=10m ./tests -v

  deploy-staging:
    name: Deploy to Staging
    if: github.ref == 'refs/heads/main'
    needs: [test, test-container]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build, publish & deploy to staging
        working-directory: dagger
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: go run . all --env staging --version ${{ github.sha }} --registry-user ${{ github.actor }}

  deploy-production:
    name: Deploy to Production
    if: github.event_name == 'release' && github.event.action == 'published'
    needs: [test, test-container]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build, publish & deploy to production
        working-directory: dagger
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: go run . all --env production --version ${{ github.event.release.tag_name }} --registry-user ${{ github.actor }}
