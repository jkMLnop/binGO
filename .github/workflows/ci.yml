name: CI/CD

# Dagger-based pipeline — all logic lives in dagger/main.go.
# This workflow is a thin trigger layer that calls Dagger functions.
#
# Push to main    → test + build + publish + deploy to staging
# PR to main      → test only (fast feedback, no deploy)
# Tag v*          → test + build + publish + deploy to production + GitHub Release
on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

jobs:
  # Run unit + integration tests on every push and PR (~30s)
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.3'

      - name: Run tests via Dagger
        working-directory: dagger
        run: go run . test

  # Run LLM pipeline integration test on push to main (costs ~$0.0001/run).
  # Validates the DeepSeek API key and end-to-end generation pipeline before
  # deploying to staging. Skipped on PRs to avoid wasting API credits.
  test-llm:
    name: Test LLM Pipeline
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.3'

      - name: Run LLM pipeline test via Dagger
        working-directory: dagger
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: go run . test-llm

  # Deploy to staging on push to main
  deploy-staging:
    name: Deploy to Staging
    needs: [test, test-llm]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.3'

      - name: Build + Publish + Deploy to Staging
        working-directory: dagger
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(git rev-parse --short HEAD)
          go run . all --env staging --version "$VERSION" --registry-user jkmlnop

  # Load test staging after every deploy to main — validates the live server
  # under concurrent load and rate-limit conditions before any prod release.
  # Skipped on PRs and tag pushes (those never deploy to staging).
  load-test-staging:
    name: Load Test Staging
    needs: deploy-staging
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.3'

      - name: Wait for staging to be healthy
        run: |
          echo "Waiting for staging server to be healthy..."
          for i in $(seq 1 12); do
            if RESP=$(curl -sf https://bingo-server-staging.fly.dev/api/status 2>/dev/null); then
              LLM=$(echo "$RESP" | grep -o '"llm_healthy":[^,}]*' | grep -o 'true\|false')
              if [ "$LLM" = "true" ]; then
                echo "✓ Staging is healthy (llm_healthy=$LLM)"
                exit 0
              fi
              echo "  attempt $i/12 — staging up but llm_healthy=$LLM, retrying in 10s"
            else
              echo "  attempt $i/12 — not reachable, retrying in 10s"
            fi
            sleep 10
          done
          echo "✗ Staging did not become healthy in 2 minutes"
          exit 1

      - name: Run load test against staging
        env:
          LOAD_TEST_URL: https://bingo-server-staging.fly.dev
          ADMIN_API_KEY: ${{ secrets.STAGING_ADMIN_API_KEY }}
          METRICS_AUTH_TOKEN: ${{ secrets.STAGING_METRICS_AUTH_TOKEN }}
          MAX_CONNS_PER_IP: '20'
        run: go test -tags=e2e -timeout=10m -v ./tests -run TestFullSystemLoadWithPlayers

  # Deploy to production + create GitHub Release on version tags
  deploy-production:
    name: Deploy to Production
    needs: test
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.3'

      - name: Build + Publish + Deploy to Production
        working-directory: dagger
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          go run . all --env production --version "$VERSION" --registry-user jkmlnop

      - name: Create GitHub Release
        working-directory: dagger
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          go run . release --version "$VERSION"
