# binGO CI/CD Pipeline
#
# Uses Dagger for all logic — this file is a thin trigger.
# Full pipeline in dagger/main.go.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

env:
  DAGGER_VERSION: 0.15.3

jobs:
  test:
    name: Unit + Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Dagger pipeline (test)
        uses: dagger/dagger-action@v1
        with:
          version: ${{ env.DAGGER_VERSION }}
          workdir: dagger
          args: go run . test

  test-container:
    name: Container Regression Tests
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Dagger pipeline (test-container)
        uses: dagger/dagger-action@v1
        with:
          version: ${{ env.DAGGER_VERSION }}
          workdir: dagger
          args: go run . test-container

  deploy-staging:
    name: Deploy to Staging
    if: github.ref == 'refs/heads/main'
    needs: [test, test-container]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Dagger pipeline (all)
        uses: dagger/dagger-action@v1
        with:
          version: ${{ env.DAGGER_VERSION }}
          workdir: dagger
          args: go run . all --env staging --version ${{ github.sha }} --registry-user ${{ github.actor }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-production:
    name: Deploy to Production
    if: github.event_name == 'release' && github.event.action == 'published'
    needs: [test, test-container]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Dagger pipeline (all)
        uses: dagger/dagger-action@v1
        with:
          version: ${{ env.DAGGER_VERSION }}
          workdir: dagger
          args: go run . all --env production --version ${{ github.event.release.tag_name }} --registry-user ${{ github.actor }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
