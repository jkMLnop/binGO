# binGO CI/CD Pipeline
#
# All pipeline logic lives in dagger/main.go (Go SDK).
# This workflow uses actions/setup-go to run it directly — the Dagger Go SDK
# manages its own engine connection internally; wrapping it in the
# dagger/dagger-action would create a nested Dagger connection.

name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

env:
  GO_VERSION: '1.25.3'

# Fail any step that pipes a command into another (e.g. `... | tee file`) if the
# first command fails. Without pipefail, `cmd | tee file` always exits 0 (tee's
# exit code), silently masking real failures such as a broken `flyctl deploy`.
defaults:
  run:
    shell: bash --noprofile --norc -eo pipefail {0}

jobs:
  test:
    name: Unit + Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Run unit tests
        run: go test ./...
      - name: Run integration tests
        run: go test -tags=integration -count=1 -timeout=5m ./tests -v

  test-container:
    name: Container Regression Tests
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Docker pre-flight check
        run: docker info
      - name: Run container regression tests
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"
        run: go test -tags=container -count=1 -timeout=10m -v ./tests 2>&1 | tee /tmp/container-test-output.log
      - name: Dump last 100 lines on failure
        if: failure()
        run: cat /tmp/container-test-output.log
      - name: Upload container test logs
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: container-test-logs
          path: /tmp/container-test-output.log

  deploy-staging:
    name: Deploy to Staging
    if: github.ref == 'refs/heads/main'
    needs: [test, test-container]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Dagger build image
        working-directory: dagger
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: go run . build --version ${{ github.sha }}
      - name: Dagger publish image
        working-directory: dagger
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: go run . publish --version ${{ github.sha }} --registry-user ${{ github.actor }}
      - name: Dagger deploy to staging
        working-directory: dagger
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: go run . deploy --env staging --version ${{ github.sha }} 2>&1 | tee /tmp/deploy-output.log
      - name: Dump deploy output on failure
        if: failure()
        run: cat /tmp/deploy-output.log

  deploy-production:
    name: Deploy to Production
    if: github.event_name == 'release' && github.event.action == 'published'
    needs: [test, test-container]
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - name: Build, publish & deploy to production
        working-directory: dagger
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: go run . all --env production --version ${{ github.event.release.tag_name }} --registry-user ${{ github.actor }} 2>&1 | tee /tmp/deploy-prod-output.log
      - name: Dump deploy output on failure
        if: failure()
        run: cat /tmp/deploy-prod-output.log
