name: Production Synthetic Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: '*/30 * * * *'

jobs:
  prod-readonly-smoke:
    name: Prod Read-Only Smoke
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web-client/package-lock.json

      - name: Install dependencies
        working-directory: web-client
        run: npm ci

      - name: Install Playwright browser
        working-directory: web-client
        run: npx playwright install --with-deps chromium

      - name: Run production read-only smoke tests
        working-directory: web-client
        env:
          PROD_BASE_URL: https://bingo-server.fly.dev
        run: npm run smoke:prod

      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: prod-playwright-artifacts
          path: |
            web-client/test-results
            web-client/playwright-report
          if-no-files-found: ignore

      - name: Open prod incident issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const now = new Date().toISOString();
            const title = `Production synthetic smoke failed (${now})`;
            const body = [
              `Automated read-only production smoke checks failed.`,
              ``,
              `Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              `Environment: https://bingo-server.fly.dev`,
              ``,
              `Suggested response:`,
              `1. Inspect workflow logs and Playwright artifacts`,
              `2. Reproduce with Playwright`,
              `3. Prepare a hotfix PR if needed`,
            ].join("\n");

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ["bug", "prod", "incident"],
            });
