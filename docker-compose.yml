version: '3.8'

services:
  bingo-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bingo-server
    ports:
      - "8080:8080"
    volumes:
      - bingo-data:/app/data
    environment:
      - LOG_LEVEL=info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/status"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  bingo-data:
    driver: local
