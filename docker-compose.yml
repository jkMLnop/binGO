version: '3.8'

services:
  bingo-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bingo-server
    ports:
      - "8080:8080"
    volumes:
      - bingo-data:/app/data
    environment:
      - LOG_LEVEL=info
      - ADMIN_API_KEY=dev-admin-key-local-only
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/status"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    networks:
      - bingo-network

  prometheus:
    image: prom/prometheus:latest
    container_name: bingo-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
    restart: unless-stopped
    networks:
      - bingo-network

  grafana:
    image: grafana/grafana:latest
    container_name: bingo-grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana

      - ./grafana-provisioning:/etc/grafana/provisioning:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_SECURITY_ADMIN_USER=${GRAFANA_USER:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    restart: unless-stopped
    networks:
      - bingo-network

volumes:
  bingo-data:
    driver: local
  prometheus-data:
    driver: local
  grafana-data:
    driver: local

networks:
  bingo-network:
    driver: bridge
